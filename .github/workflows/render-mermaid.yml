name: Render Mermaid Diagrams

on:
  push:
    branches: [main]
    paths:
      - '**/*.mmd'
      - 'scripts/render-mermaid.sh'
      - '.github/workflows/render-mermaid.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: render-mermaid-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Render diagrams
        run: bash scripts/render-mermaid.sh

      - name: Commit and push PNGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          find . -name '*.png' -not -path './.git/*' -not -path './node_modules/*' -print0 \
            | xargs -0 -r git add --
          if git diff --cached --quiet; then
            echo "No diagram changes to commit"
          else
            git commit -m "chore: re-render mermaid diagrams"
            git push
          fi
